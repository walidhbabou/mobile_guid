<article
  class="place-card"
  [class.active]="selected"
  (click)="onSelect()"
>
  <div class="place-card__image scenic-visual" [ngClass]="place.theme" [class.image--loading]="!imageLoaded">
    <img
      [src]="getImageSrc()"
      [alt]="place.name"
      decoding="async"
      [class.is-loaded]="imageLoaded"
      (error)="handleImageError($event)"
      (load)="onImageLoad()"
    />

    <span class="place-card__badge">{{ place.badge || 'Suggestion' }}</span>

    <button
      type="button"
      class="place-card__favorite"
      [class.is-active]="favorite"
      (click)="onToggleFavorite($event)"
      [attr.aria-label]="favorite ? 'Retirer des favoris' : 'Ajouter aux favoris'"
    >
      <ion-icon [name]="favorite ? 'heart' : 'heart-outline'"></ion-icon>
    </button>
  </div>

  <div class="place-card__body">
    <div class="place-card__meta-row">
      <span class="place-card__pill">{{ place.category }}</span>
      <span class="place-card__pill" *ngIf="place.types?.length">{{ place.types?.[0] }}</span>
      <span class="place-card__distance" *ngIf="distanceKm !== undefined">
        <ion-icon name="location-outline"></ion-icon>
        {{ distanceKm | number:'1.1-1' }} km
      </span>
    </div>

    <div class="place-card__title">
      <h3>{{ place.name }}</h3>
      <p>{{ place.location }}</p>
    </div>

    <p class="place-card__description" *ngIf="place.shortDescription">{{ place.shortDescription }}</p>
    <p class="place-card__address" *ngIf="place.address">{{ place.address }}</p>

    <div class="place-card__footer">
      <div class="place-card__rating" *ngIf="place.rating">
        <span class="stars">★★★★★</span>
        <strong>{{ place.rating | number:'1.0-1' }}</strong>
      </div>

      <span class="place-card__match" *ngIf="meta as m">
        {{ popularityLabel }} match
      </span>
    </div>

    <div class="place-card__actions">
      <a class="action action--primary" [routerLink]="['/tabs/place', place.id]" (click)="$event.stopPropagation()">
        Voir la fiche
      </a>
      <button type="button" class="action action--outline" (click)="onViewOnMap($event)">
        Carte
      </button>
      <button type="button" class="action action--outline" (click)="onOpenRoute($event)">
        Itinéraire
      </button>
    </div>
  </div>
</article>
