<button
  type="button"
  class="place-card surface-card"
  [class.active]="selected"
  (click)="onSelect()"
>
  <div class="place-card__image scenic-visual" [ngClass]="place.theme">
    <img
      *ngIf="place.imageUrl || place.fallbackImageUrl"
      [src]="place.imageUrl || place.fallbackImageUrl"
      [alt]="place.name"
      loading="lazy"
      decoding="async"
      (error)="handleImageError()"
    />
  </div>

  <div class="place-card__body">
    <div class="place-card__top">
      <div class="place-card__title">
        <h3>{{ place.name }}</h3>
        <p>{{ place.location }}</p>
      </div>

      <button
        type="button"
        class="icon-chip"
        [class.is-active]="favorite"
        (click)="onToggleFavorite($event)"
        [attr.aria-label]="favorite ? 'Retirer des favoris' : 'Ajouter aux favoris'"
      >
        <ion-icon [name]="favorite ? 'heart' : 'heart-outline'"></ion-icon>
      </button>
    </div>

    <div class="place-card__meta">
      <span class="pill" *ngIf="place.rating">
        <ion-icon name="star-outline"></ion-icon>
        <strong>{{ place.rating | number:'1.0-1' }}</strong>
      </span>

      <span class="pill" *ngIf="distanceKm !== undefined">
        <ion-icon name="navigate-outline"></ion-icon>
        {{ distanceKm | number:'1.0-1' }} km
      </span>

      <span class="pill">
        <ion-icon name="pricetag-outline"></ion-icon>
        {{ place.category }}
      </span>
    </div>

    <div class="place-card__smart" *ngIf="meta as m">
      <div class="smart-row">
        <span class="smart-item">
          <ion-icon name="cash-outline"></ion-icon>
          ~{{ m.estimatedBudget }} MAD
        </span>
        <span class="smart-item">
          <ion-icon name="time-outline"></ion-icon>
          ~{{ m.avgDurationMinutes }} min
        </span>
        <span class="smart-item smart-item--pop">
          <span class="heat-dot" [style.background]="heatColor"></span>
          {{ popularityLabel }}
        </span>
      </div>

      <div class="tags" *ngIf="m.tags.length">
        <span class="tag" *ngFor="let tag of m.tags">{{ tag }}</span>
      </div>
    </div>

    <div class="place-card__actions">
      <button type="button" class="action" (click)="onViewOnMap($event)">
        <ion-icon name="pin-outline"></ion-icon>
        Voir sur carte
      </button>
      <button type="button" class="action" (click)="onOpenRoute($event)">
        <ion-icon name="compass-outline"></ion-icon>
        Itineraire
      </button>
    </div>
  </div>
</button>
