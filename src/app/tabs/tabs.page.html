<ion-tabs>

  <!-- ── Floating Compare Bar ───────────────────────── -->
  <div class="compare-bar" *ngIf="compareCount > 0" [@barSlide]>
    <div class="compare-bar__thumbs">
      <div
        class="compare-bar__thumb"
        *ngFor="let p of comparePlaces"
        [style.backgroundImage]="'url(' + getThumb(p) + ')'"
      >
        <button class="compare-bar__x" (click)="removeFromCompare(p)">
          <ion-icon name="close-outline"></ion-icon>
        </button>
      </div>
      <div class="compare-bar__slot" *ngIf="compareCount < 3">
        <ion-icon name="add-outline"></ion-icon>
      </div>
    </div>
    <div class="compare-bar__right">
      <span class="compare-bar__hint">{{ compareCount }}/3 lieu{{ compareCount > 1 ? 'x' : '' }}</span>
      <button
        class="compare-bar__btn"
        [disabled]="compareCount < 2"
        (click)="goToCompare()"
      >
        <ion-icon name="git-compare-outline"></ion-icon>
        Comparer
      </button>
    </div>
  </div>

  <ion-tab-bar slot="bottom" class="app-tab-bar">
    <ion-tab-button tab="home" href="/tabs/home">
      <ion-icon aria-hidden="true" name="home-outline"></ion-icon>
      <ion-label>Accueil</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="map" href="/tabs/map">
      <ion-icon aria-hidden="true" name="map-outline"></ion-icon>
      <ion-label>Carte</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="favorites" href="/tabs/favorites">
      <ion-icon aria-hidden="true" name="heart-outline"></ion-icon>
      <ion-label>Favoris</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="notifications" href="/tabs/notifications" class="with-badge">
      <span class="tab-badge" *ngIf="notificationCount">{{ notificationCount }}</span>
      <ion-icon aria-hidden="true" name="notifications-outline"></ion-icon>
      <ion-label>Alertes</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="profile" href="/tabs/profile">
      <ion-icon aria-hidden="true" name="person-outline"></ion-icon>
      <ion-label>Profil</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
