<ion-content [fullscreen]="true" class="simple-auth-screen signup-screen">
  <div class="simple-auth">
    <section class="brand-block">
      <div class="brand-mark">
        <img src="assets/logo.jpg" alt="Atlas Guide" class="brand-mark__image" />
      </div>

      <p>Explorez le Maroc intelligemment</p>
    </section>

    <section class="auth-panel">
      <div class="auth-panel__header">
        <h2>Creation de compte</h2>
        <p>Creez votre espace pour sauvegarder vos lieux et vos parcours.</p>
      </div>

      <form [formGroup]="signupForm" (ngSubmit)="signup()" class="auth-form">
        <label class="field">
          <div class="field__shell">
            <ion-icon name="person-outline" aria-hidden="true"></ion-icon>
            <ion-input formControlName="firstName" type="text" placeholder="Prenom"></ion-input>
          </div>
          <small
            class="error-text"
            *ngIf="signupForm.get('firstName')?.invalid && signupForm.get('firstName')?.touched"
          >
            Minimum 2 caracteres.
          </small>
        </label>

        <label class="field">
          <div class="field__shell">
            <ion-icon name="person-outline" aria-hidden="true"></ion-icon>
            <ion-input formControlName="lastName" type="text" placeholder="Nom"></ion-input>
          </div>
          <small
            class="error-text"
            *ngIf="signupForm.get('lastName')?.invalid && signupForm.get('lastName')?.touched"
          >
            Minimum 2 caracteres.
          </small>
        </label>

        <label class="field">
          <div class="field__shell">
            <ion-icon name="mail-outline" aria-hidden="true"></ion-icon>
            <ion-input
              formControlName="email"
              type="email"
              autocomplete="email"
              placeholder="Adresse e-mail"
            ></ion-input>
          </div>
          <small
            class="error-text"
            *ngIf="signupForm.get('email')?.invalid && signupForm.get('email')?.touched"
          >
            Entrez une adresse valide.
          </small>
        </label>

        <label class="field">
          <div class="field__shell">
            <ion-icon name="lock-closed-outline" aria-hidden="true"></ion-icon>
            <ion-input
              formControlName="password"
              [type]="showPassword ? 'text' : 'password'"
              autocomplete="new-password"
              placeholder="Mot de passe"
            ></ion-input>
            <button type="button" class="icon-button" (click)="togglePasswordVisibility()">
              <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
            </button>
          </div>
          <small
            class="error-text"
            *ngIf="signupForm.get('password')?.invalid && signupForm.get('password')?.touched"
          >
            Utilisez au moins 6 caracteres.
          </small>
        </label>

        <label class="field">
          <div class="field__shell">
            <ion-icon name="shield-checkmark-outline" aria-hidden="true"></ion-icon>
            <ion-input
              formControlName="confirmPassword"
              [type]="showConfirmPassword ? 'text' : 'password'"
              autocomplete="new-password"
              placeholder="Confirmer le mot de passe"
            ></ion-input>
            <button type="button" class="icon-button" (click)="toggleConfirmPasswordVisibility()">
              <ion-icon [name]="showConfirmPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
            </button>
          </div>
          <small
            class="error-text"
            *ngIf="signupForm.get('confirmPassword')?.invalid && signupForm.get('confirmPassword')?.touched"
          >
            Confirmation requise.
          </small>
          <small
            class="error-text"
            *ngIf="signupForm.hasError('passwordMismatch') && signupForm.get('confirmPassword')?.touched"
          >
            Les mots de passe ne correspondent pas.
          </small>
        </label>

        <label class="check-row">
          <ion-checkbox formControlName="agreeToTerms"></ion-checkbox>
          <span>J'accepte les conditions d'utilisation.</span>
        </label>
        <small
          class="error-text"
          *ngIf="signupForm.get('agreeToTerms')?.invalid && signupForm.get('agreeToTerms')?.touched"
        >
          Vous devez accepter les conditions.
        </small>

        <ion-button type="submit" expand="block" class="primary-cta" [disabled]="isLoading">
          <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
          <span *ngIf="!isLoading">Creer mon compte</span>
        </ion-button>
      </form>

      <p class="auth-footer">
        Vous avez deja un compte ?
        <button type="button" class="text-link strong-link" (click)="goToLogin()">
          Se connecter
        </button>
      </p>
    </section>
  </div>
</ion-content>
