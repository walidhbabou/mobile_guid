<ion-content [fullscreen]="true" class="simple-auth-screen login-screen">
  <div class="simple-auth">
    <section class="brand-block">
      <div class="brand-mark">
        <img src="assets/logo.jpg" alt="Atlas Guide" class="brand-mark__image" />
      </div>

      <p>Explorez le Maroc intelligemment</p>
    </section>

    <section class="auth-panel">
      <div class="auth-panel__header">
        <h2>Connexion</h2>
        <p>Retrouvez vos favoris et vos parcours en quelques secondes.</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="login()" class="auth-form">
        <label class="field">
          <div class="field__shell">
            <ion-icon name="person-outline" aria-hidden="true"></ion-icon>
            <ion-input
              formControlName="identifier"
              type="text"
              autocomplete="username"
              autocapitalize="off"
              spellcheck="false"
              placeholder="Ibendo"
            ></ion-input>
          </div>
          <small
            class="error-text"
            *ngIf="loginForm.get('identifier')?.invalid && loginForm.get('identifier')?.touched"
          >
            Entrez votre e-mail ou votre identifiant.
          </small>
        </label>

        <label class="field">
          <div class="field__shell">
            <ion-icon name="lock-closed-outline" aria-hidden="true"></ion-icon>
            <ion-input
              formControlName="password"
              [type]="showPassword ? 'text' : 'password'"
              autocomplete="current-password"
              placeholder="Mot de passe"
            ></ion-input>
            <button type="button" class="icon-button" (click)="togglePasswordVisibility()">
              <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
            </button>
          </div>
          <small
            class="error-text"
            *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          >
            Utilisez au moins 4 caracteres.
          </small>
        </label>

        <button type="button" class="text-link panel-link" (click)="goToForgotPassword()">
          Mot de passe oublie ?
        </button>

        <ion-button type="submit" expand="block" class="primary-cta" [disabled]="isLoading">
          <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
          <span *ngIf="!isLoading">Se connecter</span>
        </ion-button>
      </form>

      <p class="auth-footer">
        Pas encore de compte ?
        <button type="button" class="text-link strong-link" (click)="goToSignup()">
          Creer un compte
        </button>
      </p>
    </section>
  </div>
</ion-content>
